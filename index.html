<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Опрос готовности</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: white;
  width: 800px;
  height: 500px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.header {
  background: #B122F0;
  color: white;
  padding: 14px 30px 12px;
  flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header p { font-size: 11px; opacity: 0.85; margin-top: 3px; }

.content {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.questions-panel {
  flex: 1;
  padding: 18px 30px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.question-text {
  font-size: 13px;
  color: #222;
  font-weight: 500;
  margin-bottom: 6px;
}
.rating-row {
  display: flex;
  gap: 7px;
}
.rating-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid #d4b3f7;
  background: white;
  color: #B122F0;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.rating-btn:hover { background: #f3e0fd; border-color: #B122F0; }
.rating-btn.selected { background: #B122F0; color: white; border-color: #B122F0; }

.divider { width: 1.5px; background: #f0e6fd; flex-shrink: 0; }

.result-panel {
  width: 260px;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #faf5ff;
  flex-shrink: 0;
}
.result-placeholder {
  text-align: center;
  color: #c4a0e8;
  font-size: 12px;
  line-height: 1.6;
}
.result-placeholder .icon { font-size: 26px; margin-bottom: 8px; }
.result-content { display: none; }
.result-score {
  font-size: 42px;
  font-weight: 800;
  color: #B122F0;
  text-align: center;
  line-height: 1;
}
.result-label {
  font-size: 11px;
  color: #9a6bb5;
  text-align: center;
  margin-top: 3px;
  margin-bottom: 14px;
}
.result-verdict {
  background: white;
  border: 1.5px solid #e0c8f9;
  border-radius: 12px;
  padding: 12px 14px;
}
.verdict-emoji { font-size: 18px; margin-bottom: 5px; }
.verdict-title { font-size: 13px; font-weight: 700; color: #B122F0; margin-bottom: 5px; }
.verdict-text { font-size: 11px; color: #555; line-height: 1.5; }

.footer {
  background: white;
  border-top: 1.5px solid #f0e6fd;
  padding: 10px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  margin-right: 16px;
}
.progress-bar {
  flex: 1;
  height: 5px;
  background: #f0e6fd;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #B122F0;
  border-radius: 3px;
  transition: width 0.3s ease;
  width: 0%;
}
.progress-text { font-size: 11px; color: #9a6bb5; white-space: nowrap; }
.btn-check {
  background: #B122F0;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0.4;
  pointer-events: none;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-check.active { opacity: 1; pointer-events: all; }
.btn-check.active:hover { background: #9a10d4; }
.btn-reset {
  background: white;
  color: #B122F0;
  border: 2px solid #B122F0;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-left: 8px;
  display: none;
  white-space: nowrap;
}
.btn-reset:hover { background: #f3e0fd; }
</style>
</head>
<body>

<div class="header">
  <h1>Оцените готовность компании к PR</h1>
  <p>Оцените каждое утверждение от 1 (совсем нет) до 5 (да, полный порядок)</p>
</div>

<div class="content">
  <div class="questions-panel">
    <div>
      <div class="question-text">У нас есть культура обратной связи?</div>
      <div class="rating-row" data-q="1">
        <button class="rating-btn" data-val="1">1</button>
        <button class="rating-btn" data-val="2">2</button>
        <button class="rating-btn" data-val="3">3</button>
        <button class="rating-btn" data-val="4">4</button>
        <button class="rating-btn" data-val="5">5</button>
      </div>
    </div>
    <div>
      <div class="question-text">Компания понимает свои цели на год?</div>
      <div class="rating-row" data-q="2">
        <button class="rating-btn" data-val="1">1</button>
        <button class="rating-btn" data-val="2">2</button>
        <button class="rating-btn" data-val="3">3</button>
        <button class="rating-btn" data-val="4">4</button>
        <button class="rating-btn" data-val="5">5</button>
      </div>
    </div>
    <div>
      <div class="question-text">Руководители готовы вкладываться в PR?</div>
      <div class="rating-row" data-q="3">
        <button class="rating-btn" data-val="1">1</button>
        <button class="rating-btn" data-val="2">2</button>
        <button class="rating-btn" data-val="3">3</button>
        <button class="rating-btn" data-val="4">4</button>
        <button class="rating-btn" data-val="5">5</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="result-panel">
    <div class="result-placeholder" id="result-placeholder">
      <div class="icon">🎯</div>
      Ответьте на все вопросы<br>и нажмите кнопку
    </div>
    <div class="result-content" id="result-content">
      <div class="result-score" id="result-score"></div>
      <div class="result-label">из 15 возможных</div>
      <div class="result-verdict">
        <div class="verdict-emoji" id="verdict-emoji"></div>
        <div class="verdict-title" id="verdict-title"></div>
        <div class="verdict-text" id="verdict-text"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">0 из 3</div>
  </div>
  <button class="btn-check" id="btn-check" onclick="showResult()">Узнать результат</button>
  <button class="btn-reset" id="btn-reset" onclick="resetAll()">↺ Заново</button>
</div>

<script>
const answers = {1: null, 2: null, 3: null};

document.querySelectorAll('.rating-row').forEach(row => {
  const q = parseInt(row.dataset.q);
  row.querySelectorAll('.rating-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[q] = parseInt(btn.dataset.val);
      updateProgress();
    });
  });
});

function updateProgress() {
  const filled = Object.values(answers).filter(v => v !== null).length;
  document.getElementById('progress-fill').style.width = (filled / 3 * 100) + '%';
  document.getElementById('progress-text').textContent = filled + ' из 3';
  const btn = document.getElementById('btn-check');
  filled === 3 ? btn.classList.add('active') : btn.classList.remove('active');
}

function showResult() {
  const total = answers[1] + answers[2] + answers[3];
  document.getElementById('result-score').textContent = total;
  document.getElementById('result-placeholder').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';

  let emoji, title, text;
  if (total < 9) {
    emoji = '🛠️'; title = 'Сначала — основа';
    text = 'Выстройте культуру обратной связи и прозрачность целей, потом запускайте PR.';
  } else if (total <= 12) {
    emoji = '🚀'; title = 'Можно начинать с пилота';
    text = 'Запустите PR в одном отделе, отработайте процесс и масштабируйте.';
  } else {
    emoji = '🏆'; title = 'Вы готовы — внедряйте!';
    text = 'У вас есть всё нужное. Запускайте Performance Review на всю компанию.';
  }

  document.getElementById('verdict-emoji').textContent = emoji;
  document.getElementById('verdict-title').textContent = title;
  document.getElementById('verdict-text').textContent = text;
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-reset').style.display = 'inline-block';
  document.querySelectorAll('.rating-btn').forEach(b => b.style.pointerEvents = 'none');
}

function resetAll() {
  answers[1] = null; answers[2] = null; answers[3] = null;
  document.querySelectorAll('.rating-btn').forEach(b => {
    b.classList.remove('selected');
    b.style.pointerEvents = 'all';
  });
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-text').textContent = '0 из 3';
  document.getElementById('result-placeholder').style.display = 'block';
  document.getElementById('result-content').style.display = 'none';
  document.getElementById('btn-check').style.display = 'inline-block';
  document.getElementById('btn-check').classList.remove('active');
  document.getElementById('btn-reset').style.display = 'none';
}
</script>
</body>
</html>
